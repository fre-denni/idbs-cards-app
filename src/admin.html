<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IDBS Admin</title>
    <link rel="stylesheet" href="./css/main.css" />
    <link rel="stylesheet" href="./css/admin.css" />
  </head>
  <body>
    <header class="admin-header">
      <div class="admin-header-left">
        <p class="text-h3-header">Admin-</p>
        <p class="text-h3-header" style="text-transform: uppercase">
          Hi <span id="userName">Name</span>!
        </p>
      </div>
      <div class="admin-header-right">
        <a href="/dashboard.html" class="btn-link text-small-body">
          Go to your dashboard
        </a>
        <button id="logoutBtn" class="btn-sm">Logout</button>
      </div>
    </header>

    <main class="admin-main">
      <div class="mobile">
        <p class="text-mobile-body">
          Sorry, your device width is too small, you'll need your computer for
          this.
        </p>
      </div>
      <!-- ── CARD ASSIGNMENTS ─────────────────────────────── -->
      <section class="admin-section">
        <div class="section-header">
          <h2 class="text-item-header">Card Assignments</h2>
          <div class="section-actions">
            <button id="btn-rand-all" class="btn-action">
              🎲 Randomize ALL
            </button>
          </div>
        </div>
        <p id="table-status" class="status-msg text-small-body"></p>
        <div class="table-wrapper">
          <table id="cards-table">
            <thead id="cards-thead"></thead>
            <tbody id="cards-tbody"></tbody>
          </table>
        </div>
      </section>

      <!-- ── GROUPS MANAGEMENT ────────────────────────────── -->
      <section class="admin-section">
        <div class="section-header">
          <h2 class="text-item-header">Groups Management</h2>
          <button id="btn-add-group-open" class="btn-action">
            + New Group
          </button>
        </div>

        <!-- Add group form (hidden by default) -->
        <div id="add-group-form" class="add-form hidden">
          <input
            type="number"
            id="new-group-number"
            class="text-small-body"
            placeholder="Group number (e.g. 21)" />
          <button id="btn-add-group" class="btn-sm">Create Group</button>
          <button id="btn-add-group-cancel" class="btn-sm btn-ghost">
            Cancel
          </button>
          <p id="add-group-error" class="error-msg text-small-body"></p>
        </div>

        <div id="groups-list"></div>
      </section>
    </main>

    <script type="module" src="./js/admin.js"></script>
  </body>
</html>
