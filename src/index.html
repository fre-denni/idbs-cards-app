<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="The card-sorting tool from the Interaction Basics course of Politecnico di Milano, bachelor's of Digital Interaction Design. Designed by Federico Denni" />
    <title>IDBS Cards</title>
    <link rel="stylesheet" href="./css/main.css" />
  </head>
  <body>
    <header>
      <p class="text-logo-header">IDBS</p>
      <p class="text-item-header">Interaction Design Basics</p>
    </header>

    <main>
      <div class="mobile">
        <p class="text-mobile-body">
          Sorry, your device width is too small, you'll need your computer for
          this.
        </p>
      </div>
      <div class="auth-container">
        <h1 class="auth-brand text-logo-header">IDBS</h1>

        <form id="authForm">
          <!-- Step 1: Email -->
          <div id="emailSection">
            <label class="text-small-body">Your Polimi Mail</label>
            <input
              type="email"
              id="emailInput"
              class="text-small-body"
              placeholder="Insert you name.surname@polimi mail"
              autocomplete="email"
              required />
          </div>

          <!-- Step 2: OTP (nascosto finché non viene inviato il codice) -->
          <div id="otpSection" class="hidden">
            <p id="statusMessage" class="text-small-body"></p>
            <!-- Campo nascosto che auth.js continua a leggere -->
            <input type="hidden" id="otpInput" />

            <div class="otp-wrapper">
              <div class="otp-group">
                <input
                  type="text"
                  class="otp-cell otp-cell-left"
                  data-otp="0"
                  inputmode="numeric"
                  maxlength="1"
                  autocomplete="one-time-code" />
                <input
                  type="text"
                  class="otp-cell otp-cell-mid"
                  data-otp="1"
                  inputmode="numeric"
                  maxlength="1" />
                <input
                  type="text"
                  class="otp-cell otp-cell-right"
                  data-otp="2"
                  inputmode="numeric"
                  maxlength="1" />
              </div>
              <span class="otp-divider"></span>
              <div class="otp-group">
                <input
                  type="text"
                  class="otp-cell otp-cell-left"
                  data-otp="3"
                  inputmode="numeric"
                  maxlength="1" />
                <input
                  type="text"
                  class="otp-cell otp-cell-mid"
                  data-otp="4"
                  inputmode="numeric"
                  maxlength="1" />
                <input
                  type="text"
                  class="otp-cell otp-cell-right"
                  data-otp="5"
                  inputmode="numeric"
                  maxlength="1" />
              </div>
            </div>

            <p id="emailDisplay" class="text-small-body hidden"></p>
          </div>

          <button type="submit" id="mainButton" class="text-small-body">
            Check email
          </button>
        </form>

        <p id="errorMessage" class="text-small-body"></p>

        <!-- Resend button, visibile solo allo step OTP -->
        <button id="resendBtn" class="text-small-body hidden">
          Didn't receive the code? Send it again
        </button>
      </div>
    </main>

    <footer></footer>

    <script type="module" src="./js/auth.js"></script>
    <script>
      // ─── OTP input behaviour ──────────────────────────────────────────
      (() => {
        const cells = document.querySelectorAll(".otp-cell");
        const hidden = document.getElementById("otpInput");

        function syncHidden() {
          hidden.value = Array.from(cells)
            .map((c) => c.value)
            .join("");
        }

        cells.forEach((cell, i) => {
          // Input singolo → avanza al prossimo
          cell.addEventListener("input", () => {
            cell.value = cell.value.replace(/\D/g, "").slice(-1);
            syncHidden();
            if (cell.value && i < cells.length - 1) cells[i + 1].focus();
          });

          // Backspace → cancella e torna indietro
          cell.addEventListener("keydown", (e) => {
            if (e.key === "Backspace" && !cell.value && i > 0) {
              cells[i - 1].focus();
              cells[i - 1].value = "";
              syncHidden();
            }
          });

          // Paste → distribuisce le cifre su tutti i campi
          cell.addEventListener("paste", (e) => {
            e.preventDefault();
            const paste = (e.clipboardData.getData("text") || "").replace(
              /\D/g,
              "",
            );
            if (!paste) return;
            for (let j = 0; j < cells.length; j++) {
              cells[j].value = paste[j] || "";
            }
            syncHidden();
            const nextEmpty = Array.from(cells).findIndex((c) => !c.value);
            (nextEmpty === -1
              ? cells[cells.length - 1]
              : cells[nextEmpty]
            ).focus();
          });
        });
      })();
    </script>
  </body>
</html>
