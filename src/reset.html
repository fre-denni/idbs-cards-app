<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password</title>
    <link rel="stylesheet" href="./css/main.css" />
  </head>

  <body>
    <header>
      <p class="text-logo-header">IDBS</p>
      <p class="text-item-header">Interaction Design Basics</p>
    </header>

    <main>
      <div class="auth-container">
        <h1 class="auth-brand text-logo-header">Reset Password</h1>

        <form id="resetForm">
          <div class="form-section">
            <label class="text-small-body"> Please re-insert your email </label>
            <input
              type="email"
              id="resetEmail"
              class="text-small-body"
              placeholder="Re-insert your Polimi mail"
              required />
          </div>

          <div class="form-section">
            <label class="text-small-body">
              Insert new password (min 8 characters)
            </label>
            <input
              type="password"
              id="newPassword"
              class="text-small-body"
              minlength="8"
              placeholder="Insert new password"
              required />
          </div>

          <button type="submit" id="resetButton" class="text-small-body">
            Update Password
          </button>
        </form>

        <p id="message" class="text-small-body"></p>
      </div>
    </main>

    <footer></footer>

    <script type="module" src="./js/reset.js"></script>
  </body>
</html>
